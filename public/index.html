<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Imposter Drawing Game</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app">
    <section id="joinScreen" class="panel">
      <h1>Imposter Drawing Game</h1>
      <p>Join a room to start.</p>
      <input id="roomInput" type="text" placeholder="Room code" maxlength="12" />
      <button id="joinBtn">Join Room</button>
      <p id="joinMessage" class="message"></p>
    </section>

    <section id="lobbyScreen" class="panel hidden">
      <h2>Lobby</h2>
      <p>Room: <span id="roomCodeText"></span></p>
      <p id="hostText"></p>

      <h3>Players</h3>
      <ul id="playerList"></ul>

      <button id="startBtn" class="hidden">Start Game</button>
      <p id="lobbyMessage" class="message"></p>
    </section>

    <section id="gameScreen" class="panel hidden">
      <h2>Game Started</h2>
      <p id="roleText"></p>
      <p id="categoryText"></p>
      <p id="wordText"></p>
    </section>
  </main>

  <script src="/socket.io/socket.io.js"></script>
  <script src="app.js"></script>
</body>
</html>
